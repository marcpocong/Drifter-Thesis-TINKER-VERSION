# Phase 2: Ensemble Perturbation Parameters
# Configuration for uncertainty quantification and ensemble forecasting

ensemble:
  ensemble_size: 50

official_forecast:
  transport_model: oceandrift
  provisional_transport_model: true
  loading_audit_basename: phase2_loading_audit
  snapshot_hours: [24, 48, 72]
  probability_thresholds: [0.5, 0.9]
  require_wave_forcing: true
  enable_stokes_drift: true
  deterministic:
    start_time_offset_hours: 0
    wind_factor: 1.0
    horizontal_diffusivity_m2s: 2.0
  ensemble:
    ensemble_size: 50
    wind_factor_min: 0.8
    wind_factor_max: 1.2
    start_time_offset_hours: [-3, -2, -1, 0, 1, 2, 3]
    horizontal_diffusivity_m2s_min: 1.0
    horizontal_diffusivity_m2s_max: 10.0

official_products:
  snapshot_hours: [24, 48, 72]
  probability_thresholds: [0.5, 0.9]

official_retention:
  selected_mode: R1
  selected_phase: official_rerun_r1
  selected_from: output/CASE_MINDORO_RETRO_2023/transport_retention_fix/transport_retention_run_manifest.json
  selection_reason: >
    Transport-retention sensitivity showed R1 preserved raw activity,
    probability presence, and p50 signal through the strict March 6
    validation horizon while R0/R2 died around March 5. R3 also survived
    but is diagnostic-only and not a thesis-final candidate.
  medium_tier_blocked_until_selected_rerun: true
  scenarios:
    R1:
      coastline_action: previous
      coastline_approximation_precision: 0.001
      time_step_minutes: 60
      diagnostic_only: false
      thesis_final_candidate: true
    R3:
      coastline_action: none
      coastline_approximation_precision: 0.001
      time_step_minutes: 60
      diagnostic_only: true
      thesis_final_candidate: false
  
# Perturbation Ranges (Monte Carlo)
perturbations:
  # Start time jitter in hours (+/- window)
  time_shift_hours: 3.0
  
  # Horizontal diffusivity range (m2/s)
  diffusivity_min: 0.01
  diffusivity_max: 0.1
  
  # Wind uncertainty factor range (simulating +/- 20% error)
  # Values passed to OpenDrift's 'drift:wind_uncertainty'
  wind_uncertainty_min: 0.5
  wind_uncertainty_max: 2.0
