notes:
- Official Mindoro spill-case workflows inherit recipe provenance from this separate
  focused Phase 1 drifter rerun rather than from the preserved three-date 2016 prototype
  artifact.
- The focused rerun now evaluates the full four-recipe family cmems_era5, cmems_gfs,
  hycom_era5, and hycom_gfs after a GFS completeness preflight across all accepted
  focused months.
- Official B1 now promotes the focused historical winner directly so the main-validation
  ensemble recipe matches the completed focused rerun result.
- This finalizes Mindoro-specific recipe provenance only and does not rewrite the
  raw-generation history of the stored March 13 -> March 14 B1 output bundle.
- The broader 2016-2022 regional rerun remains preserved as a regional reference/governance
  lane and is not the active provenance for Mindoro B1.
- The focused rerun searched through early 2023, but its accepted registry does not
  include near-2023 accepted segments.
